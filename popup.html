<!DOCTYPE html>
<html>
  <head>
    <script src="libs/jspdf.umd.min.js"></script>
    <script src="libs/jspdf.plugin.autotable.min.js"></script>
    <title>FlexEase Extension</title>
    <style>
      html,
      body {
        width: 340px;
        min-height: 0;
        height: 100%;
        background: #f6f8fa;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        border: none;
      }
      body {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: stretch;
      }
      .popup-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        margin: 0;
        padding: 24px 20px 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1 1 auto;
        min-height: 0;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 18px;
        color: #003366;
        letter-spacing: 1px;
        text-align: center;
      }
      .button-group {
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 100%;
        margin-bottom: 10px;
        flex: 0 0 auto;
      }
      button {
        padding: 10px 0;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        border: none;
        width: 100%;
        transition: background 0.2s, color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      /* Row holding the Download button + the photo toggle beside it */
      .download-row {
        display: flex;
        align-items: stretch;
        gap: 10px;
        width: 100%;
      }
      #download-transcript {
        background: linear-gradient(90deg, #4caf50 60%, #388e3c 100%);
        color: #fff;
        flex: 1 1 auto;
      }
      #download-transcript:hover:not(:disabled) {
        background: linear-gradient(90deg, #388e3c 60%, #4caf50 100%);
      }
      #remove-block-script {
        background: linear-gradient(90deg, #f44336 60%, #d32f2f 100%);
        color: #fff;
      }
      #remove-block-script:hover:not(:disabled) {
        background: linear-gradient(90deg, #d32f2f 60%, #f44336 100%);
      }
      .icon {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      /* Photo toggle pill sitting aside the Download button */
      .photo-toggle {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 0 6px;
        background: #f1f4f8;
        border-radius: 8px;
        border: 1px solid #e0e6ed;
      }
      .toggle-label {
        font-size: 10px;
        font-weight: 600;
        color: #003366;
        line-height: 1;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 38px;
        height: 20px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #b0bec5;
        transition: 0.2s;
        border-radius: 20px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: #fff;
        transition: 0.2s;
        border-radius: 50%;
      }
      .switch input:checked + .slider {
        background-color: #4caf50;
      }
      .switch input:checked + .slider:before {
        transform: translateX(18px);
      }
      .status {
        width: 100%;
        min-height: 18px;
        margin-top: 4px;
        font-size: 12px;
        text-align: center;
        color: #003366;
      }
      .status.error {
        color: #c62828;
      }
      .status.success {
        color: #2e7d32;
        font-weight: 600;
      }
      .footer {
        margin-top: auto;
        font-size: 12px;
        color: #888;
        text-align: center;
        width: 100%;
        padding-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="popup-card">
      <h1>FlexEase</h1>
      <div class="button-group">
        <div class="download-row">
          <button
            id="download-transcript"
            title="Auto-fetches details and downloads your transcript from any page"
          >
            <span class="icon">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
            </span>
            Download Transcript
          </button>
          <div class="photo-toggle" title="Include profile photo in the PDF">
            <label class="switch">
              <input type="checkbox" id="include-photo" checked />
              <span class="slider"></span>
            </label>
            <span class="toggle-label">Photo</span>
          </div>
        </div>
        <button id="remove-block-script">
          <span class="icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </span>
          Remove Block Script
        </button>
      </div>
      <div id="status" class="status"></div>
      <div class="footer">FlexEase &copy; 2025 &mdash; Fast NU Karachi</div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
